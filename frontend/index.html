<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3000 Recruitment AI - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base: '#030712', panel: '#0A0F1C', edge: 'rgba(255,255,255,0.08)',
              indigo: '#6366F1', violet: '#A78BFA', cyan: '#22D3EE', mist: '#9CA3AF',
            },
            fontFamily: {
              display: ['"Space Grotesk"', 'sans-serif'],
              body: ['"Inter"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
          },
        },
      };
    </script>
</head>
<body class="bg-base text-gray-200 font-body antialiased overflow-x-hidden min-h-screen relative flex flex-col">

    <div class="fixed inset-0 bg-grid grid-fade pointer-events-none" aria-hidden="true"></div>
    <div class="fixed inset-0 pointer-events-none" aria-hidden="true">
      <div class="aurora float-slow absolute -top-32 -left-24 w-[34rem] h-[34rem] rounded-full bg-indigo opacity-20"></div>
      <div class="aurora float-slower absolute top-10 right-[-8rem] w-[30rem] h-[30rem] rounded-full bg-violet opacity-20"></div>
    </div>
    <div class="fixed inset-0 noise pointer-events-none" aria-hidden="true"></div>

    <header class="sticky top-0 z-50 bg-base/80 backdrop-blur-md border-b border-edge">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 h-18 flex items-center justify-between py-4">
            <a href="index.html" class="flex items-center gap-2.5 group">
                <span class="relative w-8 h-8 rounded-lg bg-gradient-to-br from-indigo via-violet to-cyan flex items-center justify-center shadow-lg shadow-indigo/30">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="2.4" fill="white"/>
                    </svg>
                </span>
                <span class="font-display font-semibold tracking-tight text-white text-[15px] sm:text-base">
                    <span class="text-mist">3000-CV-MATCHING</span>
                </span>
            </a>
            <nav class="flex gap-6 text-sm font-medium">
                <a href="index.html" class="text-white border-b-2 border-cyan py-1">Dashboard</a>
                <a href="about.html" class="text-mist hover:text-white transition-colors py-1">About</a>
            </nav>
        </div>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto w-full px-6 lg:px-8 py-10 flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-panel border border-edge rounded-2xl p-6 shadow-xl backdrop-blur-sm">
                    <h2 class="font-display font-semibold text-lg text-white mb-4 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-cyan animate-pulse"></span>
                        New Batch
                    </h2>
                    <form id="uploadForm" class="space-y-5">
                        <div>
                            <label class="block text-xs font-mono text-mist mb-2">CV Batch (.zip)</label>
                            <input type="file" id="cvFile" accept=".zip" required class="block w-full text-sm text-mist file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-indigo/20 file:text-indigo hover:file:bg-indigo/30 file:transition-colors bg-base border border-edge rounded-lg cursor-pointer">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-mono text-mist mb-2">Required Skills</label>
                            <div class="flex gap-2">
                                <input type="text" id="skillInput" placeholder="e.g. Python..." class="w-full bg-base border border-edge text-gray-200 p-2.5 rounded-lg text-sm placeholder-gray-600 focus:outline-none focus:border-indigo focus:ring-1 focus:ring-indigo transition-all">
                                <button type="button" onclick="addSkill()" class="bg-indigo text-white px-4 rounded-lg font-bold hover:bg-indigo/80 transition-colors shadow-lg shadow-indigo/20">+</button>
                            </div>
                        </div>
                        
                        <div id="skillsContainer" class="flex flex-wrap gap-2 min-h-[40px]"></div>
                        
                        <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-indigo to-violet text-white py-2.5 rounded-xl font-medium hover:opacity-90 transition-opacity shadow-lg shadow-indigo/20 flex justify-center items-center gap-2">
                            Process Batch
                        </button>
                    </form>
                    
                    <button type="button" onclick="clearResults()" class="w-full mt-6 text-xs font-mono text-mist hover:text-red-400 transition-colors underline decoration-edge hover:decoration-red-400/30">
                        Clear Saved Metrics
                    </button>
                </div>
            </div>
            
            <div class="lg:col-span-3">
                
                <div class="mb-4 flex gap-3 justify-end h-10">
                    <button id="compareBtn" onclick="openComparisonModal()" 
                            class="hidden bg-cyan/10 border border-cyan/30 text-cyan px-5 py-2 rounded-full text-sm font-semibold hover:bg-cyan/20 transition-all shadow-lg shadow-cyan/10">
                        Compare Selected
                    </button>
                    
                    <button id="exportBtn" onclick="exportToExcel()" 
                            class="hidden bg-indigo/10 border border-indigo/30 text-indigo px-5 py-2 rounded-full text-sm font-semibold hover:bg-indigo/20 transition-all shadow-lg shadow-indigo/10">
                        Export Metrics (Excel)
                    </button>
                </div>

                <div id="emptyState" class="bg-panel border border-edge rounded-2xl p-16 text-center shadow-xl backdrop-blur-sm">
                    <div class="w-16 h-16 rounded-full bg-base border border-edge flex items-center justify-center mx-auto mb-4 text-mist">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </div>
                    <p class="text-mist font-medium">Upload a ZIP batch and define JD skills to begin semantic matching.</p>
                </div>
                
                <div id="resultsTable" class="bg-panel border border-edge rounded-2xl overflow-hidden hidden shadow-xl backdrop-blur-sm">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-base border-b border-edge text-xs font-mono uppercase text-mist">
                                <tr>
                                    <th class="px-6 py-4 font-medium">Sel</th>
                                    <th class="px-6 py-4 font-medium">Rank</th>
                                    <th class="px-6 py-4 font-medium">Candidate</th>
                                    <th class="px-6 py-4 font-medium">Match Score</th>
                                    <th class="px-6 py-4 font-medium">Status</th>
                                    <th class="px-6 py-4 font-medium text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody" class="divide-y divide-edge"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="compareModal" class="hidden fixed inset-0 z-[100] bg-base/80 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-panel border border-edge rounded-2xl shadow-2xl max-w-5xl w-full p-8 max-h-[90vh] overflow-y-auto relative">
            <div class="absolute inset-0 bg-grid grid-fade pointer-events-none opacity-50 rounded-2xl"></div>
            
            <div class="relative z-10 flex justify-between items-center mb-8 border-b border-edge pb-4">
                <h2 class="text-2xl font-display font-bold text-white flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-cyan"></span>
                    Semantic Comparison
                </h2>
                <button onclick="closeModal()" class="text-mist hover:text-white transition-colors">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="h-96 w-full relative bg-base border border-edge rounded-xl p-4">
                    <canvas id="compareRadarChart"></canvas>
                </div>
                <div id="compareDetails" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let candidatesData = [];
        let jdSkillsList = [];

        // LOAD DATA
        document.addEventListener("DOMContentLoaded", () => {
            const saved = localStorage.getItem('batchResults');
            if(saved) {
                candidatesData = JSON.parse(saved);
                renderLeaderboard(candidatesData);
            }
        });

        // SKILL MANAGEMENT
        document.getElementById('skillInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); 
                addSkill();
            }
        });

        function addSkill() {
            const input = document.getElementById('skillInput');
            const val = input.value.trim().toLowerCase();
            if (val && !jdSkillsList.includes(val)) {
                jdSkillsList.push(val);
                renderTags();
                input.value = '';
            }
        }

        function renderTags() {
            const container = document.getElementById('skillsContainer');
            container.innerHTML = jdSkillsList.map(s => `
                <span class="bg-indigo/10 border border-indigo/20 text-indigo px-2.5 py-1 rounded-md text-xs font-mono flex items-center gap-1.5 shadow-sm">
                    ${s} 
                    <button type="button" onclick="removeSkill('${s}')" class="hover:text-white transition-colors font-bold">×</button>
                </span>
            `).join('');
        }

        function removeSkill(skill) {
            jdSkillsList = jdSkillsList.filter(s => s !== skill);
            renderTags();
        }

        // PROCESSING
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('cvFile');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select a file to upload.");
                return;
            }

            // Determine if it's a zip file
            const isZip = file.name.toLowerCase().endsWith('.zip');
            
            // Set endpoint and API keys accordingly
            const endpoint = isZip 
                ? "http://localhost:8000/api/v1/evaluate-batch" 
                : "http://localhost:8000/api/v1/evaluate";
                
            const formData = new FormData();
            // Assuming the single endpoint takes 'file' or 'cv_file'. Adjust 'file' if your backend expects a different key.
            formData.append(isZip ? "cv_zip" : "file", file);
            jdSkillsList.forEach(s => formData.append("jd_skills", s));

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true; 
            
            // Dynamic loading text
            btn.innerHTML = `<span class="animate-pulse">${isZip ? 'Processing Batch...' : 'Processing CV...'}</span>`;

            try {
                const response = await fetch(endpoint, { method: "POST", body: formData });
                
                if (!response.ok) {
                    throw new Error(`Server error: ${response.statusText}`);
                }
                
                let data = await response.json();
                
                // If the single evaluation returns an object, wrap it in an array for the leaderboard
                if (!Array.isArray(data)) {
                    data = [data];
                }
                
                candidatesData = data;
                
                // Save progress and metrics
                localStorage.setItem('batchResults', JSON.stringify(candidatesData)); 
                
                renderLeaderboard(candidatesData);
            } catch(err) { 
                alert("Error: " + err.message); 
            } finally { 
                btn.disabled = false; 
                btn.innerHTML = originalText; 
            }
        });
        let selectedCandidates = [];

        function renderLeaderboard(data) {
            selectedCandidates = [];
            document.getElementById('compareBtn').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultsTable').classList.remove('hidden');
            document.getElementById('exportBtn').classList.remove('hidden');

            const body = document.getElementById('leaderboardBody');
            const savedStatuses = JSON.parse(localStorage.getItem('candidateStatuses') || '{}');
            const sortedData = [...data].sort((a,b) => b.score - a.score);
            
            body.innerHTML = sortedData.map((cand, i) => {
                const savedStatus = savedStatuses[cand.candidate_id] || 'New';
                
                return `
                <tr class="hover:bg-white/5 transition-colors group">
                    <td class="px-6 py-4">
                        <input type="checkbox" onchange="toggleSelection('${cand.candidate_id}')" 
                            class="w-4 h-4 rounded border-edge bg-base text-indigo focus:ring-indigo/50 focus:ring-offset-base accent-indigo cursor-pointer">
                    </td>
                    <td class="px-6 py-4 font-mono font-bold text-mist">#${i+1}</td>
                    <td class="px-6 py-4 font-medium text-white">${cand.name}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-2">
                            <div class="w-full bg-base rounded-full h-1.5 max-w-[100px] border border-edge">
                                <div class="bg-gradient-to-r from-cyan to-indigo h-1.5 rounded-full" style="width: ${cand.score}%"></div>
                            </div>
                            <span class="text-sm font-mono text-cyan">${cand.score}%</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <select onchange="updateCandidateStatus('${cand.candidate_id}', this.value)" 
                                class="text-xs font-mono border border-edge rounded-md p-1.5 bg-base text-gray-200 focus:ring-1 focus:ring-indigo outline-none cursor-pointer">
                            <option value="New" ${savedStatus === 'New' ? 'selected' : ''}>New</option>
                            <option value="Shortlisted" ${savedStatus === 'Shortlisted' ? 'selected' : ''}>Shortlisted</option>
                            <option value="Interviewing" ${savedStatus === 'Interviewing' ? 'selected' : ''}>Interviewing</option>
                            <option value="Rejected" ${savedStatus === 'Rejected' ? 'selected' : ''}>Rejected</option>
                        </select>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick="navigateToAnalysis(${i})" class="text-indigo group-hover:text-cyan transition-colors text-sm font-mono font-semibold flex items-center justify-end gap-1 ml-auto">
                            Analyze
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        function updateCandidateStatus(candidateId, newStatus) {
            const savedStatuses = JSON.parse(localStorage.getItem('candidateStatuses') || '{}');
            savedStatuses[candidateId] = newStatus;
            localStorage.setItem('candidateStatuses', JSON.stringify(savedStatuses));
        }

        function toggleSelection(id) {
            const index = selectedCandidates.indexOf(id);
            if (index > -1) {
                selectedCandidates.splice(index, 1);
            } else {
                if (selectedCandidates.length < 3) {
                    selectedCandidates.push(id);
                } else {
                    alert("You can only compare up to 3 candidates.");
                    event.target.checked = false; 
                    return;
                }
            }
            
            const btn = document.getElementById('compareBtn');
            selectedCandidates.length > 1 ? btn.classList.remove('hidden') : btn.classList.add('hidden');
        }

        let compareChart = null;
        function openComparisonModal() {
            const modal = document.getElementById('compareModal');
            const selectedData = candidatesData.filter(c => selectedCandidates.includes(c.candidate_id));

            if (selectedData.length === 0) {
                alert("No candidate data found for selection.");
                return;
            }

            modal.classList.remove('hidden');

            try {
                const ctx = document.getElementById('compareRadarChart').getContext('2d');
                if (compareChart) compareChart.destroy();
                
                if (!selectedData[0].details || Object.keys(selectedData[0].details).length === 0) {
                    document.getElementById('compareDetails').innerHTML = "<p class='text-red-400 font-mono text-sm'>No skill data available to compare.</p>";
                    return;
                }

                // Dark mode chart configuration
                compareChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: Object.keys(selectedData[0].details).map(s => s.toUpperCase()),
                        datasets: selectedData.map((c, i) => ({
                            label: c.name,
                            data: Object.values(c.details).map(d => d.score * 100),
                            backgroundColor: i === 0 ? 'rgba(99, 102, 241, 0.2)' : 
                                           i === 1 ? 'rgba(34, 211, 238, 0.2)' : 
                                                     'rgba(167, 139, 250, 0.2)',
                            borderColor: i === 0 ? '#6366F1' : 
                                         i === 1 ? '#22D3EE' : 
                                                   '#A78BFA',
                            pointBackgroundColor: 'rgba(3, 7, 18, 0.8)',
                            pointBorderColor: i === 0 ? '#6366F1' : i === 1 ? '#22D3EE' : '#A78BFA'
                        }))
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: { 
                                beginAtZero: true, 
                                max: 100,
                                grid: { color: 'rgba(255, 255, 255, 0.1)' },
                                angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                                pointLabels: { 
                                    color: '#9CA3AF', 
                                    font: { family: '"JetBrains Mono", monospace', size: 10 } 
                                },
                                ticks: { 
                                    backdropColor: 'transparent', 
                                    color: '#6B7280',
                                    showLabelBackdrop: false
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#E5E7EB', font: { family: '"Inter", sans-serif' } }
                            }
                        }
                    }
                });

                document.getElementById('compareDetails').innerHTML = selectedData.map(c => `
                    <div class="border border-edge rounded-xl p-5 bg-base flex flex-col gap-2 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10">
                             <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <h3 class="font-display font-bold text-white text-lg">${c.name}</h3>
                        <p class="text-sm text-mist font-mono">${c.demographics?.location || 'Location N/A'}</p>
                        <div class="mt-auto pt-4 border-t border-edge flex items-center justify-between">
                            <span class="text-xs text-mist uppercase tracking-wider">Semantic Match</span>
                            <span class="text-lg font-mono font-bold text-cyan">${c.score}%</span>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Chart Error:", err);
            }
        }

        function closeModal() {
            document.getElementById('compareModal').classList.add('hidden');
        }

        function clearResults() {
            localStorage.removeItem('batchResults');
            candidatesData = [];
            selectedCandidates = []; 
            document.getElementById('compareBtn').classList.add('hidden');
            document.getElementById('exportBtn').classList.add('hidden'); 
            document.getElementById('resultsTable').classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
            document.getElementById('leaderboardBody').innerHTML = '';
        }

        function navigateToAnalysis(index) {
            const sortedData = [...candidatesData].sort((a,b) => b.score - a.score);
            localStorage.setItem('activeCandidate', JSON.stringify(sortedData[index]));
            window.location.href = 'analysis.html';
        }

        function exportToExcel() {
            if (candidatesData.length === 0) return;
            const savedStatuses = JSON.parse(localStorage.getItem('candidateStatuses') || '{}');
            const formattedData = candidatesData.sort((a,b) => b.score - a.score).map((c, i) => ({
                "Rank": i + 1,
                "Name": c.name,
                "Score (%)": c.score,
                "Status": savedStatuses[c.candidate_id] || "New",
                "Email": c.demographics?.email || "N/A",
                "Phone": c.demographics?.phone || "N/A",
                "Location": c.demographics?.location || "N/A"
            }));

            const ws = XLSX.utils.json_to_sheet(formattedData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Candidates");
            const fileName = `SAIL_Recruitment_Metrics_${new Date().toISOString().slice(0,10)}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }
    </script>
</body>
</html>
